name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lightweight-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke test launch imports
        run: python scripts/smoke_test_launch_imports.py

      - name: Run lightweight pytest suite
        env:
          PYTHONPATH: .
        run: pytest -m "not heavy and not integration" -q --tb=short
