# Production profile — no --reload, multiple workers, health checks, no source bind mount.
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# Provide secrets/config via a .env file (see .env.example).

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
    command: >
      uvicorn mbsi.api.main:app
      --host 0.0.0.0 --port 8000
      --workers ${WEB_CONCURRENCY:-4}
      --timeout-keep-alive 30
      --no-access-log
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  ui:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      streamlit run app/streamlit_app.py
      --server.address=0.0.0.0 --server.port=8501
      --server.headless=true
      --browser.gatherUsageStats=false
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  data:
