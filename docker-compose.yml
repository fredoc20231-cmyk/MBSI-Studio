version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn mbsi.api.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
      - MBSI_CORS_ORIGINS=http://localhost:8501,http://127.0.0.1:8501

  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    command: streamlit run app/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api

volumes:
  data:
